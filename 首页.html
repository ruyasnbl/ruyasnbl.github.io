<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiangXD's Homepage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .container {
      text-align: center;
      background: white;
      padding: 60px 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 90%;
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: #5183f4;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 36px;
      font-weight: bold;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #222;
    }
    .desc {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }
    .github {
      background: #24292f;
      color: white;
    }
    .github:hover {
      background: #000;
    }
    .site {
      background: #5183f4;
      color: white;
    }
    .site:hover {
      background: #3a6fe0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">L</div>
    <h1>LiangXD</h1>
    <p class="desc">热爱编程、持续学习<br>这是我的 GitHub Pages 个人主页</p>
    <div class="links">
      <a href="https://github.com/liangxd21" class="github" target="_blank">GitHub</a>
      <a href="https://liangxd21.github.io" class="site">个人主页</a>
    </div>
  </div>
</body>
</html>
