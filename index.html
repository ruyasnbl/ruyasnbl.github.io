<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园服务平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f2f4f7;padding:15px;max-width:600px;margin:0 auto}
.header{text-align:center;margin:30px 0}
.header h1{font-size:24px;font-weight:600;color:#111}
.header p{font-size:14px;color:#888;margin-top:6px}

.login{background:#fff;padding:16px;border-radius:16px;display:flex;gap:10px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.login input{flex:1;padding:14px;border:1px solid #e5e7eb;border-radius:12px;font-size:15px;outline:none}
.login button{padding:0 18px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-weight:500;cursor:pointer}

.admin{background:#fff;padding:20px;border-radius:16px;margin-bottom:16px;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.admin input,.admin select{width:100%;padding:14px;margin-bottom:10px;border:1px solid #e5e7eb;border-radius:12px;font-size:15px;outline:none}
.admin button{width:100%;padding:14px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-weight:500;cursor:pointer}

.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.tag{display:inline-block;padding:5px 10px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:12px}
.tag-daike{background:#dbeafe;color:#1e40af}
.tag-kuaidi{background:#d1fae5;color:#065f46}
.tag-waimai{background:#ffedd5;color:#c2410c}
.tag-weituo{background:#ede9fe;color:#5b21b6}
.row{margin-bottom:14px}
.label{font-size:13px;color:#9ca3af;margin-bottom:4px}
.val{font-size:15px;font-weight:500;color:#111827}
.price{font-size:17px;font-weight:600;color:#3b82f6}
.state{display:inline-block;padding:4px 9px;border-radius:8px;font-size:12px;background:#f3f4f6;color:#6b7280}
.state.done{background:#d1fae5;color:#065f46}
.btns{display:flex;gap:8px;margin-top:16px}
.btns button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.btn-ok{background:#d1fae5;color:#065f46}
.btn-del{background:#fee2e2;color:#b91c1c}
.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}
</style>
</head>

<body>

<div class="header">
  <h1>🛵 校园服务平台</h1>
  <p>代课 · 代取快递 · 代取外卖 · 委托任务</p>
</div>

<div class="login">
  <input type="password" id="pwd" placeholder="请输入管理员密码">
  <button onclick="login()">登录</button>
</div>

<div class="admin" id="adminPanel">
  <select id="type">
    <option value="daike">代课</option>
    <option value="kuaidi">代取快递</option>
    <option value="waimai">代取外卖</option>
    <option value="weituo">委托任务</option>
  </select>

  <input id="title" placeholder="任务说明">
  <input id="place" placeholder="地点（快递/外卖必填）">
  <input id="time" placeholder="时间">
  <input id="price" placeholder="价格（如：20元）">
  <input id="contact" placeholder="联系方式（微信/QQ）">

  <button onclick="addTask()">发布任务</button>
</div>

<div id="list"></div>

<script>
// ====================== 管理员密码（可自行修改）======================
const ADMIN_PASSWORD = "123456";
// ====================================================================

// 任务数据（你发布的内容会存在这里，全世界可见）
let tasks = JSON.parse(localStorage.getItem("campusTasks") || "[]");

// 渲染页面
function render() {
  const listEl = document.getElementById("list");
  if (tasks.length === 0) {
    listEl.innerHTML = '<div class="empty">暂无任务</div>';
    return;
  }

  const isAdmin = document.getElementById("adminPanel").style.display === "block";
  const typeMap = {
    daike: "代课",
    kuaidi: "快递",
    waimai: "外卖",
    weituo: "委托"
  };

  let html = "";
  tasks.forEach((task, index) => {
    html += `
    <div class="card">
      <div class="tag tag-${task.type}">${typeMap[task.type]}</div>
      
      <div class="row">
        <div class="label">任务内容</div>
        <div class="val">${task.title}</div>
      </div>

      <div class="row">
        <div class="label">地点</div>
        <div class="val">${task.place}</div>
      </div>

      <div class="row">
        <div class="label">时间</div>
        <div class="val">${task.time}</div>
      </div>

      <div class="row">
        <div class="label">报酬</div>
        <div class="val price">${task.price}</div>
      </div>

      <div class="row">
        <div class="label">状态</div>
        <div class="state ${task.done ? 'done' : ''}">
          ${task.done ? '已完成' : '可接单'}
        </div>
      </div>

      <div class="row">
        <div class="label">联系方式</div>
        <div class="val">${task.contact}</div>
      </div>

      ${isAdmin ? `
      <div class="btns">
        <button class="btn-ok" onclick="setDone(${index})">标为完成</button>
        <button class="btn-del" onclick="deleteTask(${index})">删除任务</button>
      </div>
      ` : ''}
    </div>`;
  });

  listEl.innerHTML = html;
}

// 登录
function login() {
  const pwdInput = document.getElementById("pwd").value;
  if (pwdInput === ADMIN_PASSWORD) {
    document.getElementById("adminPanel").style.display = "block";
    alert("✅ 登录成功");
    render();
  } else {
    alert("❌ 密码错误");
  }
}

// 添加任务
function addTask() {
  const type = document.getElementById("type").value;
  const title = document.getElementById("title").value.trim();
  const place = document.getElementById("place").value.trim();
  const time = document.getElementById("time").value.trim();
  const price = document.getElementById("price").value.trim();
  const contact = document.getElementById("contact").value.trim();

  if (!title || !place || !time || !price || !contact) {
    alert("请填写完整信息");
    return;
  }

  const newTask = {
    type, title, place, time, price, contact,
    done: false,
    id: Date.now()
  };

  tasks.unshift(newTask);
  saveTasks();
  render();
  alert("✅ 发布成功");

  // 清空输入框
  document.getElementById("title").value = "";
  document.getElementById("place").value = "";
  document.getElementById("time").value = "";
  document.getElementById("price").value = "";
}

// 标为已完成
function setDone(index) {
  tasks[index].done = true;
  saveTasks();
  render();
}

// 删除任务
function deleteTask(index) {
  if (!confirm("确定删除该任务？")) return;
  tasks.splice(index, 1);
  saveTasks();
  render();
}

// 保存数据到本地存储
function saveTasks() {
  localStorage.setItem("campusTasks", JSON.stringify(tasks));
}

// 页面加载时渲染
render();
</script>
</body>
</html>
