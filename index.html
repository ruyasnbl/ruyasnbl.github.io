<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共留言板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f5f5f5;padding:20px}
.container{max-width:700px;margin:0 auto}
.box{background:white;padding:16px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 5px #00000010}
textarea{width:100%;height:80px;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:10px}
button{padding:10px 20px;background:#0d8dec;color:white;border:none;border-radius:8px;cursor:pointer}
.msg{background:#f9f9f9;padding:12px;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
  <div class="box">
    <h3>公共留言板（所有人可发）</h3>
    <textarea id="content" placeholder="写下你想说的话..."></textarea>
    <button onclick="sendMsg()">发布留言</button>
  </div>

  <div id="msgList"></div>
</div>

<script>
// 从本地保存留言（简单可用版）
function loadMsg(){
  let list = JSON.parse(localStorage.getItem('msgs') || '[]')
  let html = ''
  list.forEach(m=>{
    html+=`<div class="msg">${m.text}<br><small>${m.time}</small></div>`
  })
  document.getElementById('msgList').innerHTML = html
}

function sendMsg(){
  let text = document.getElementById('content').value.trim()
  if(!text)return
  let time = new Date().toLocaleString()
  let list = JSON.parse(localStorage.getItem('msgs') || '[]')
  list.unshift({text,time})
  localStorage.setItem('msgs',JSON.stringify(list))
  document.getElementById('content').value=''
  loadMsg()
}

loadMsg()
</script>
</body>
</html>
