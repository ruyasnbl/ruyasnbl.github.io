<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园服务平台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f2f4f7;
  padding: 15px;
  max-width: 600px;
  margin: 0 auto;
}

/* 头部 */
.header {
  text-align: center;
  margin: 30px 0 20px;
}
.header h1 {
  font-size: 24px;
  font-weight: 600;
  color: #111;
}
.header p {
  font-size: 14px;
  color: #888;
  margin-top: 6px;
}

/* 登录 */
.login-box {
  background: #fff;
  padding: 16px;
  border-radius: 16px;
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.login-box input {
  flex: 1;
  padding: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
  transition: border 0.2s;
}
.login-box input:focus {
  border-color: #3b82f6;
}
.login-box button {
  padding: 0 18px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 500;
  cursor: pointer;
}

/* 管理面板 */
.admin-panel {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 16px;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.admin-panel input,
.admin-panel select {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
}
.admin-panel button {
  width: 100%;
  padding: 14px;
  background: #3b82f6;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 500;
  font-size: 15px;
  cursor: pointer;
}

/* 任务卡片 */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

/* 任务类型标签 */
.tag {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.tag-daike { background: #dbeafe; color: #1e40af; }
.tag-kuaidi { background: #d1fae5; color: #065f46; }
.tag-waimai { background: #ffedd5; color: #c2410c; }
.tag-weituo { background: #ede9fe; color: #5b21b6; }

.row {
  margin-bottom: 14px;
}
.row .label {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 4px;
}
.row .val {
  font-size: 15px;
  font-weight: 500;
  color: #111827;
}
.row .price {
  font-size: 17px;
  font-weight: 600;
  color: #3b82f6;
}

.state {
  display: inline-block;
  padding: 4px 9px;
  border-radius: 8px;
  font-size: 12px;
  background: #f3f4f6;
  color: #6b7280;
}
.state.done {
  background: #d1fae5;
  color: #065f46;
}

/* 管理按钮 */
.btns {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.btns button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
}
.btn-ok {
  background: #d1fae5;
  color: #065f46;
}
.btn-del {
  background: #fee2e2;
  color: #b91c1c;
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: #aaa;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🛵 校园服务平台</h1>
  <p>代课 · 代取快递 · 代取外卖 · 委托任务</p>
</div>

<div class="login-box">
  <input type="password" id="pwd" placeholder="请输入管理员密码">
  <button onclick="login()">登录</button>
</div>

<div class="admin-panel" id="adminPanel">
  <select id="type">
    <option value="daike">代课</option>
    <option value="kuaidi">代取快递</option>
    <option value="waimai">代取外卖</option>
    <option value="weituo">委托任务</option>
  </select>

  <input id="title" placeholder="任务说明">
  <input id="place" placeholder="地点（快递/外卖必填）">
  <input id="time" placeholder="时间">
  <input id="price" placeholder="价格（如：20元）">
  <input id="contact" placeholder="联系方式（微信/QQ）">

  <button onclick="add()">发布任务</button>
</div>

<div id="list"></div>

<script>
const ADMIN_PWD = "123456";
const user = "liangxd21";
const repo = "liangxd21.github.io";

async function loadList() {
  const el = document.getElementById("list");
  el.innerHTML = "加载中...";
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/issues?per_page=100`);
    const list = await res.json();
    if (!list.length) {
      el.innerHTML = `<div class="empty">暂无任务</div>`;
      return;
    }

    let html = "";
    list.forEach(issue => {
      try {
        const d = JSON.parse(issue.title);
        const isAdmin = document.getElementById("adminPanel").style.display === "block";
        const typeName = {
          daike: "代课",
          kuaidi: "快递",
          waimai: "外卖",
          weituo: "委托"
        };
        html += `
        <div class="card">
          <div class="tag tag-${d.type}">${typeName[d.type]}</div>

          <div class="row">
            <div class="label">任务内容</div>
            <div class="val">${d.title}</div>
          </div>

          <div class="row">
            <div class="label">地点</div>
            <div class="val">${d.place}</div>
          </div>

          <div class="row">
            <div class="label">时间</div>
            <div class="val">${d.time}</div>
          </div>

          <div class="row">
            <div class="label">报酬</div>
            <div class="val price">${d.price}</div>
          </div>

          <div class="row">
            <div class="label">状态</div>
            <div class="state ${d.done ? 'done' : ''}">
              ${d.done ? '已完成' : '可接单'}
            </div>
          </div>

          <div class="row">
            <div class="label">联系方式</div>
            <div class="val">${d.contact}</div>
          </div>

          ${isAdmin ? `
          <div class="btns">
            <button class="btn-ok" onclick="done(${issue.number})">标为完成</button>
            <button class="btn-del" onclick="del(${issue.number})">删除</button>
          </div>
          ` : ''}
        </div>`;
      } catch (e) {}
    });
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty">加载失败，请刷新</div>`;
  }
}

function login() {
  const v = document.getElementById("pwd").value;
  if (v === ADMIN_PWD) {
    document.getElementById("adminPanel").style.display = "block";
    alert("✅ 登录成功");
    loadList();
  } else {
    alert("❌ 密码错误");
  }
}

function add() {
  const type = document.getElementById("type").value;
  const title = document.getElementById("title").value.trim();
  const place = document.getElementById("place").value.trim();
  const time = document.getElementById("time").value.trim();
  const price = document.getElementById("price").value.trim();
  const contact = document.getElementById("contact").value.trim();

  if (!title || !place || !time || !price || !contact) {
    alert("请填写完整信息");
    return;
  }

  const data = JSON.stringify({
    type, title, place, time, price, contact, done: false
  });

  window.open(`https://github.com/${user}/${repo}/issues/new?title=${encodeURIComponent(data)}`);
}

function done(num) {
  alert("请在 GitHub 页面编辑状态");
  window.open(`https://github.com/${user}/${repo}/issues/${num}`);
}

function del(num) {
  if (!confirm("确定删除该任务？")) return;
  window.open(`https://github.com/${user}/${repo}/issues/${num}`);
}

loadList();
</script>
</body>
</html>
