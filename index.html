<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>留言板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f8fa;padding:15px;max-width:600px;margin:0 auto}
.box{background:white;padding:16px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
h2{font-size:18px;margin-bottom:10px}
textarea{width:100%;height:90px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:10px;resize:none}
button{width:100%;padding:12px;background:#0071e3;color:white;border:none;border-radius:8px;font-size:15px;font-weight:500}
.msg{background:#f9f9f9;padding:12px;border-radius:8px;margin-bottom:8px}
.time{font-size:12px;color:#888;margin-top:4px}
</style>
</head>

<body>
<div class="box">
  <h2>🌍 留言板</h2>
  <textarea id="text" placeholder="输入内容..."></textarea>
  <button onclick="postMsg()">发布留言</button>
</div>

<div id="list"></div>

<script>
// 你的信息
const owner = "liangxd21";
const repo = "liangxd21.github.io";

// 加载留言（真实可用）
async function load() {
  let dom = document.getElementById('list');
  dom.innerHTML = "加载中...";
  
  try {
    let r = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues?per_page=50`);
    let data = await r.json();
    let html = '';
    data.forEach(item => {
      let time = new Date(item.created_at).toLocaleString();
      html += `
      <div class="msg">
        ${item.title}
        <div class="time">${time}</div>
      </div>`;
    });
    dom.innerHTML = html;
  } catch(e) {
    dom.innerHTML = "加载失败，请刷新";
  }
}

// 发布（跳一次 GitHub，但国内可访问）
function postMsg() {
  let t = document.getElementById('text').value.trim();
  if (!t) return alert('请输入内容');
  
  let url = `https://github.com/${owner}/${repo}/issues/new?title=${encodeURIComponent(t)}`;
  window.open(url);
  document.getElementById('text').value = '';
  setTimeout(load, 2000);
}

load();
</script>
</body>
</html>
